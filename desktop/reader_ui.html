<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  :root { --bg-alpha: 0.75; --bg: rgba(30,30,30, var(--bg-alpha)); --tc: #e0e0e0; --btn-bg: rgba(20,20,30,0.55); --font: 18px; --line-height: 1.9; --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; }
  :root.light  { --bg: rgba(255,255,255, var(--bg-alpha)); --tc: #374151; --btn-bg: rgba(255,255,255,0.50); }
  :root.dark   { --bg: rgba(26,26,46, var(--bg-alpha));  --tc: #e5e7eb; --btn-bg: rgba(22,22,42,0.55); }
  :root.sepia  { --bg: rgba(244,236,216, var(--bg-alpha)); --tc: #5b4636; --btn-bg: rgba(235,225,200,0.55); }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: transparent !important; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; }

  .wrapper { display: flex; flex-direction: column; height: 100%; border-radius: 12px; overflow: hidden; background: var(--bg); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); transition: background .3s; }

  /* ── 工具栏 ── */
  .toolbar { display: flex; align-items: center; gap: 4px; padding: 4px 8px 4px 14px; flex-shrink: 0; cursor: default; user-select: none; background: var(--btn-bg); transition: background .3s, opacity .35s; }
  .toolbar.toolbar-hidden { opacity: 0; pointer-events: none; }
  .toolbar-title { flex: 1; min-width: 0; font-size: 11px; font-weight: 500; opacity: 0.45; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--tc); }
  .win-btn { width: 32px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; background: transparent; color: var(--tc); transition: background .15s; font-family: "Segoe MDL2 Assets", "Segoe UI Symbol", sans-serif; }
  .win-btn:hover { background: rgba(128,128,128,0.2); }
  .win-btn.close:hover { background: #e81123; color: #fff; }
  .opacity-slider { width: 42px; height: 14px; cursor: pointer; accent-color: #888; opacity: 0.35; transition: opacity .15s; }
  .opacity-slider:hover { opacity: 0.7; }

  /* ── 内容区 ── */
  .content { flex: 1; overflow-y: auto; padding: 10px 22px 28px; font-size: var(--font); line-height: var(--line-height); color: var(--tc); font-family: var(--font-family); transition: color .3s, opacity .2s; }
  .content-title { text-align: center; font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--tc); padding: 10px 0 8px; }
  .reading-time { text-align: center; font-size: 11px; opacity: 0.30; margin-bottom: 20px; color: var(--tc); }
  .content-body { max-width: 460px; margin: 0 auto; }
  .content-body p { text-indent: 2em; margin-bottom: 0.5em; }
  .content-body p:empty { display: none; }
  .end-marker { text-align: center; padding: 36px 0 12px; opacity: 0.18; font-size: 12px; }

  .content::-webkit-scrollbar { width: 5px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: rgba(156,163,175,0.35); border-radius: 3px; }

  /* ── 空状态 ── */
  .empty-state { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; pointer-events: none; }
  .empty-state .icon { font-size: 40px; }
  .empty-state .text { font-size: 13px; opacity: 0.35; color: var(--tc); }

  /* ── 阅读进度条 ── */
  .progress-bar { height: 2px; background: rgba(128,128,128,0.10); flex-shrink: 0; }
  .progress-bar-fill { height: 100%; background: rgba(128,128,128,0.30); transition: width .3s; width: 0%; }

  /* ── 底部阅读控件 ── */
  .reading-controls { display: none; justify-content: center; align-items: center; gap: 10px; padding: 8px 20px 14px; flex-shrink: 0; transition: opacity .35s, transform .35s; }
  .reading-controls.visible { display: flex; }
  .reading-controls.rc-hidden { opacity: 0; transform: translateY(8px); pointer-events: none; }
  .rc-group { display: flex; align-items: center; gap: 2px; background: var(--btn-bg); border-radius: 8px; padding: 2px 4px; }
  .rc-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; background: transparent; color: var(--tc); transition: background .15s; }
  .rc-btn:hover { background: rgba(128,128,128,0.15); }
  .rc-label { font-size: 11px; min-width: 22px; text-align: center; color: var(--tc); opacity: 0.7; }
  .rc-btn:disabled { opacity: 0.25; cursor: default; }
  .rc-btn:disabled:hover { background: transparent; }
  .rc-nav { width: 32px; height: 28px; font-size: 13px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%);
    padding: 6px 14px; background: rgba(0,0,0,0.78); color: #fff;
    font-size: 12px; border-radius: 6px; z-index: 9999;
    pointer-events: none; white-space: nowrap;
    transition: opacity .25s;
  }
</style>
</head>
<body>

<div class="wrapper">
  <!-- 工具栏（拖拽手柄） -->
  <div class="toolbar" id="toolbar">
    <span class="toolbar-title" id="tbTitle">起点阅读 — 等待内容</span>
    <input type="range" id="opacitySlider" class="opacity-slider" min="20" max="95" value="75" title="透明度">
    <button class="win-btn" id="btnFullscreen" title="全屏 (F)">⛶</button>
    <button class="win-btn" id="btnMin" title="最小化">&#x2014;</button>
    <button class="win-btn" id="btnMax" title="最大化">&#x25A1;</button>
    <button class="win-btn close" id="btnClose" title="关闭 (Esc)">&#x2715;</button>
  </div>

  <!-- 内容区域 -->
  <div class="content" id="contentEl">
    <div class="empty-state" id="emptyState">
      <span class="icon">📖</span>
      <span class="text">等待章节内容...</span>
      <span class="text" style="font-size:11px">请在起点章节页点击右下角浮动按钮</span>
    </div>
    <div class="content-title" id="contentTitle" style="display:none"></div>
    <div class="reading-time" id="readingTime" style="display:none"></div>
    <div class="content-body" id="contentBody"></div>
    <div class="end-marker" id="endMarker" style="display:none">— END —</div>
  </div>

  <!-- 阅读进度 -->
  <div class="progress-bar" id="progressBar" style="display:none">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>

  <!-- 底部阅读控件 -->
  <div class="reading-controls" id="readingControls">
    <div class="rc-group">
      <button class="rc-btn rc-nav" id="btnPrev" title="上一章 (←)" disabled>◀</button>
    </div>
    <div class="rc-group">
      <button class="rc-btn" id="btnFontDown" title="缩小字体 (-)">A-</button>
      <span class="rc-label" id="fontLabel">18</span>
      <button class="rc-btn" id="btnFontUp" title="放大字体 (+)">A+</button>
    </div>
    <button class="rc-btn" id="btnLineHeight" title="行间距" style="width:32px;height:28px;font-size:11px">1.9</button>
    <button class="rc-btn" id="btnFontFamily" title="字体切换" style="width:32px;height:28px;font-size:14px;font-weight:700">𝐀</button>
    <button class="rc-btn" id="btnTheme" title="切换主题 (T)" style="width:32px;height:32px;font-size:14px">🌙</button>
    <div class="rc-group">
      <button class="rc-btn rc-nav" id="btnNext" title="下一章 (→)" disabled>▶</button>
    </div>
  </div>
</div>

<script>
  // ── localStorage 替代（pywebview NavigateToString 模式禁止访问 localStorage） ──
  var __mem = {};
  var _ls = {
    getItem: function(k) { return __mem[k] || null; },
    setItem: function(k, v) { __mem[k] = v; }
  };

  /* ── 状态 ── */
  let fontSize = 18;
  let theme = "dark";
  let lineHeight = 1.9;
  let fontFamilyIdx = 0;
  let currentNextUrl = null;
  let currentPrevUrl = null;
  let isLoadingChapter = false;
  let loadingTimeout = null;

  const FONT_FAMILIES = [
    "-apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, \"Noto Sans SC\", sans-serif",
    "\"Noto Serif SC\", \"SimSun\", \"STSong\", serif",
    "\"KaiTi\", \"STKaiti\", \"楷体\", cursive",
    "\"Microsoft YaHei\", \"PingFang SC\", \"Helvetica Neue\", sans-serif"
  ];
  const FONT_FAMILY_LABELS = ["系统", "宋", "楷", "黑"];
  const LINE_HEIGHTS = [1.5, 1.7, 1.9, 2.1, 2.3];

  /* ── DOM 引用 ── */
  var contentEl = document.getElementById("contentEl");
  var toolbar = document.getElementById("toolbar");
  var readingControls = document.getElementById("readingControls");

  /* ── 设置持久化 ── */
  function saveSettings() {
    _ls.setItem("qidian-theme", theme);
    _ls.setItem("qidian-fontSize", String(fontSize));
    _ls.setItem("qidian-lineHeight", String(lineHeight));
    _ls.setItem("qidian-fontFamily", String(fontFamilyIdx));
  }

  function restoreSettings() {
    var s = _ls.getItem("qidian-theme");
    if (s) { theme = s; }
    s = _ls.getItem("qidian-fontSize");
    if (s) { fontSize = parseInt(s, 10) || 18; }
    s = _ls.getItem("qidian-lineHeight");
    if (s) { lineHeight = parseFloat(s) || 1.9; }
    s = _ls.getItem("qidian-fontFamily");
    if (s) { fontFamilyIdx = parseInt(s, 10) || 0; }
  }

  function applyFontSize() {
    document.documentElement.style.setProperty("--font", fontSize + "px");
    document.getElementById("fontLabel").textContent = fontSize;
  }

  function applyLineHeight() {
    document.documentElement.style.setProperty("--line-height", String(lineHeight));
    document.getElementById("btnLineHeight").textContent = lineHeight.toFixed(1);
  }

  function applyFontFamily() {
    document.documentElement.style.setProperty("--font-family", FONT_FAMILIES[fontFamilyIdx]);
  }

  /* ── 主题 ── */
  function applyTheme(t) {
    theme = t;
    document.documentElement.className = t;
    document.getElementById("btnTheme").textContent = t === "light" ? "☀️" : t === "dark" ? "🌙" : "📜";
    saveSettings();
  }

  /* ── 内容更新 ── */
  function updateContent(title, content, nextUrl, prevUrl) {
    clearToast();
    if (loadingTimeout) { clearTimeout(loadingTimeout); loadingTimeout = null; }

    // 淡出
    contentEl.style.opacity = "0";

    setTimeout(function() {
      document.getElementById("emptyState").style.display = "none";
      var tEl = document.getElementById("contentTitle");
      tEl.style.display = "block";
      tEl.textContent = title;

      // 预计阅读时间
      var bodyEl = document.getElementById("contentBody");
      bodyEl.innerHTML = content;
      var charCount = (bodyEl.textContent || "").replace(/\s/g, "").length;
      var minutes = Math.max(1, Math.ceil(charCount / 400));
      var rtEl = document.getElementById("readingTime");
      rtEl.style.display = "block";
      rtEl.textContent = "约 " + minutes + " 分钟";

      document.getElementById("endMarker").style.display = "block";
      document.getElementById("tbTitle").textContent = title;
      readingControls.classList.add("visible");
      document.getElementById("progressBar").style.display = "block";

      currentNextUrl = nextUrl || null;
      currentPrevUrl = prevUrl || null;
      isLoadingChapter = false;
      updateNavButtons();
      contentEl.scrollTo({ top: 0, behavior: "smooth" });
      updateProgress();

      // 淡入
      contentEl.style.opacity = "1";
    }, 200);
  }

  function updateNavButtons() {
    document.getElementById("btnNext").disabled = !currentNextUrl;
    document.getElementById("btnPrev").disabled = !currentPrevUrl;
  }

  function setLoadingComplete() {
    isLoadingChapter = false;
    if (loadingTimeout) { clearTimeout(loadingTimeout); loadingTimeout = null; }
  }

  /* ── 章节导航（带超时保护） ── */
  function navigateChapter(url, label) {
    if (!url || isLoadingChapter) return;
    isLoadingChapter = true;
    showToast("正在加载" + label + "…");
    window.pywebview.api.request_chapter(url);

    // 10 秒超时保护：若内容未到达则恢复按钮
    if (loadingTimeout) clearTimeout(loadingTimeout);
    loadingTimeout = setTimeout(function() {
      if (isLoadingChapter) {
        isLoadingChapter = false;
        showToast("加载超时，请重试");
      }
    }, 10000);
  }

  /* ── Toast ── */
  function showToast(msg) {
    clearToast();
    var el = document.createElement("div");
    el.className = "toast";
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function() {
      el.style.opacity = "0";
      setTimeout(function() { if (el.parentNode) el.remove(); }, 300);
    }, 3000);
  }

  function clearToast() {
    var existing = document.querySelector(".toast");
    if (existing) existing.remove();
  }

  /* ── 进度条 ── */
  function updateProgress() {
    var h = contentEl.scrollHeight - contentEl.clientHeight;
    var pct = h > 0 ? Math.min(100, Math.round((contentEl.scrollTop / h) * 100)) : 0;
    document.getElementById("progressFill").style.width = pct + "%";
  }

  var progressRaf = null;
  contentEl.addEventListener("scroll", function() {
    if (progressRaf) return;
    progressRaf = requestAnimationFrame(function() {
      updateProgress();
      progressRaf = null;
      resetAutoHide();
    });
  });

  /* ── 控件自动隐藏 ── */
  var autoHideTimer = null;
  var AUTO_HIDE_DELAY = 3000;

  function showControls() {
    toolbar.classList.remove("toolbar-hidden");
    readingControls.classList.remove("rc-hidden");
  }

  function hideControls() {
    toolbar.classList.add("toolbar-hidden");
    readingControls.classList.add("rc-hidden");
  }

  function resetAutoHide() {
    showControls();
    if (autoHideTimer) clearTimeout(autoHideTimer);
    autoHideTimer = setTimeout(hideControls, AUTO_HIDE_DELAY);
  }

  // 鼠标移动时重置
  document.addEventListener("mousemove", function(e) {
    // 不响应纯键盘光标移动
    if (e.movementX !== 0 || e.movementY !== 0) {
      resetAutoHide();
    }
  });

  // 鼠标悬停在控件上时暂停
  toolbar.addEventListener("mouseenter", function() { if (autoHideTimer) clearTimeout(autoHideTimer); });
  toolbar.addEventListener("mouseleave", function() { autoHideTimer = setTimeout(hideControls, AUTO_HIDE_DELAY); });
  readingControls.addEventListener("mouseenter", function() { if (autoHideTimer) clearTimeout(autoHideTimer); });
  readingControls.addEventListener("mouseleave", function() { autoHideTimer = setTimeout(hideControls, AUTO_HIDE_DELAY); });

  // ── 透明度滑块 ──
  (function(){
    var slider = document.getElementById("opacitySlider");
    var saved = _ls.getItem("qidian-opacity");
    if (saved) { slider.value = saved; }
    function apply(alpha) {
      document.documentElement.style.setProperty("--bg-alpha", alpha);
    }
    apply(slider.value / 100);
    slider.addEventListener("input", function() {
      apply(this.value / 100);
      _ls.setItem("qidian-opacity", this.value);
    });
  })();

  // ── 窗口控制按钮 ──
  document.getElementById("btnMin").addEventListener("click", function(e){
    e.stopPropagation();
    window.pywebview.api.minimize();
  });
  document.getElementById("btnMax").addEventListener("click", function(e){
    e.stopPropagation();
    window.pywebview.api.toggle_maximize();
  });
  document.getElementById("btnClose").addEventListener("click", function(e){
    e.stopPropagation();
    window.pywebview.api.close();
  });
  document.getElementById("btnFullscreen").addEventListener("click", function(e){
    e.stopPropagation();
    window.pywebview.api.toggle_fullscreen();
  });

  // ── 键盘快捷键 ──
  document.addEventListener("keydown", function(e){
    // 不在输入框内时处理快捷键
    var tag = (e.target.tagName || "").toUpperCase();
    if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;

    switch (e.key) {
      case "ArrowLeft":  navigateChapter(currentPrevUrl, "上一章"); e.preventDefault(); break;
      case "ArrowRight": navigateChapter(currentNextUrl, "下一章"); e.preventDefault(); break;
      case " ": case "PageDown":
        e.preventDefault();
        contentEl.scrollBy({ top: contentEl.clientHeight * 0.8, behavior: "smooth" });
        break;
      case "Shift": break; // Shift 组合键在下面处理
      case "PageUp":
        e.preventDefault();
        contentEl.scrollBy({ top: -contentEl.clientHeight * 0.8, behavior: "smooth" });
        break;
      case "+": case "=":
        e.preventDefault();
        fontSize = Math.min(32, fontSize + 2);
        applyFontSize();
        saveSettings();
        break;
      case "-":
        e.preventDefault();
        fontSize = Math.max(14, fontSize - 2);
        applyFontSize();
        saveSettings();
        break;
      case "t": case "T":
        e.preventDefault();
        var list = ["light","dark","sepia"];
        applyTheme(list[(list.indexOf(theme) + 1) % 3]);
        break;
      case "f": case "F":
        e.preventDefault();
        window.pywebview.api.toggle_fullscreen();
        break;
      case "Escape": window.pywebview.api.close(); break;
    }
  });

  // Shift+Space → 向上翻屏
  document.addEventListener("keydown", function(e){
    if (e.key === " " && e.shiftKey) {
      e.preventDefault();
      contentEl.scrollBy({ top: -contentEl.clientHeight * 0.8, behavior: "smooth" });
    }
  });

  // ── 阅读控制按钮 ──
  document.getElementById("btnFontDown").addEventListener("click", function(){
    fontSize = Math.max(14, fontSize - 2);
    applyFontSize();
    saveSettings();
  });
  document.getElementById("btnFontUp").addEventListener("click", function(){
    fontSize = Math.min(32, fontSize + 2);
    applyFontSize();
    saveSettings();
  });
  document.getElementById("btnTheme").addEventListener("click", function(){
    var list = ["light","dark","sepia"];
    applyTheme(list[(list.indexOf(theme) + 1) % 3]);
  });

  // 行间距
  document.getElementById("btnLineHeight").addEventListener("click", function(){
    var idx = LINE_HEIGHTS.indexOf(lineHeight);
    lineHeight = LINE_HEIGHTS[(idx + 1) % LINE_HEIGHTS.length];
    applyLineHeight();
    saveSettings();
  });

  // 字体族
  document.getElementById("btnFontFamily").addEventListener("click", function(){
    fontFamilyIdx = (fontFamilyIdx + 1) % FONT_FAMILIES.length;
    applyFontFamily();
    document.getElementById("btnFontFamily").textContent = FONT_FAMILY_LABELS[fontFamilyIdx];
    saveSettings();
  });

  // ── 章节导航按钮 ──
  document.getElementById("btnNext").addEventListener("click", function(){
    navigateChapter(currentNextUrl, "下一章");
  });
  document.getElementById("btnPrev").addEventListener("click", function(){
    navigateChapter(currentPrevUrl, "上一章");
  });

  // ── 统一拖拽 + 边框缩放（单一事件系统，无冲突） ──
  (function(){
    var wrapper = document.querySelector(".wrapper");
    var action = null;     // 'drag' | 'resize'
    var resizeDir = null;
    var startSX, startSY, startW, startH;
    var EDGE = 6;

    var cursors = { n:'ns-resize', s:'ns-resize', e:'ew-resize', w:'ew-resize',
                    ne:'nesw-resize', sw:'nesw-resize', nw:'nwse-resize', se:'nwse-resize' };

    function getResizeDir(e) {
      var rect = wrapper.getBoundingClientRect();
      var x = e.clientX - rect.left;
      var y = e.clientY - rect.top;
      var t = y <= EDGE, b = y >= rect.height - EDGE;
      var l = x <= EDGE, r = x >= rect.width - EDGE;
      if (t && l) return 'nw'; if (t && r) return 'ne';
      if (b && l) return 'sw'; if (b && r) return 'se';
      if (t) return 'n'; if (b) return 's';
      if (l) return 'w'; if (r) return 'e';
      return null;
    }

    function onToolbar(e) {
      return !!(e.target.closest && e.target.closest(".toolbar"));
    }

    function isInteractive(e) {
      var t = e.target.tagName;
      return t === "BUTTON" || t === "INPUT" || t === "SELECT" || t === "TEXTAREA";
    }

    document.addEventListener("mousemove", function(e){
      if (action === "drag") {
        try { window.pywebview.api.drag_to(e.screenX, e.screenY); } catch(err) {}
        return;
      }
      if (action === "resize") {
        var dx = e.screenX - startSX, dy = e.screenY - startSY;
        var nw = startW, nh = startH;
        if (resizeDir.indexOf("e") !== -1) nw = startW + dx;
        if (resizeDir.indexOf("w") !== -1) nw = startW - dx;
        if (resizeDir.indexOf("s") !== -1) nh = startH + dy;
        if (resizeDir.indexOf("n") !== -1) nh = startH - dy;
        nw = Math.max(300, nw); nh = Math.max(350, nh);
        try { window.pywebview.api.resize(nw, nh); } catch(err) {}
        return;
      }
      // 空闲：更新光标
      if (onToolbar(e)) {
        wrapper.style.cursor = "default";
      } else {
        var d = getResizeDir(e);
        wrapper.style.cursor = d ? cursors[d] : "default";
      }
    });

    document.addEventListener("mousedown", function(e){
      if (action) return;
      if (isInteractive(e)) return;
      if (onToolbar(e)) {
        action = "drag";
        try { window.pywebview.api.start_drag(e.screenX, e.screenY); } catch(err) {}
        e.preventDefault();
        return;
      }
      var d = getResizeDir(e);
      if (d) {
        action = "resize";
        resizeDir = d;
        startSX = e.screenX; startSY = e.screenY;
        startW = window.innerWidth; startH = window.innerHeight;
        e.preventDefault();
      }
    });

    document.addEventListener("mouseup", function(){
      action = null;
      resizeDir = null;
    });
  })();

  // ── 启动：恢复设置 ──
  restoreSettings();
  applyFontSize();
  applyLineHeight();
  applyFontFamily();
  applyTheme(theme);
  document.getElementById("btnFontFamily").textContent = FONT_FAMILY_LABELS[fontFamilyIdx];

  // 初始自动隐藏计时
  resetAutoHide();
</script>
</body>
</html>
